<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>黄帝养成系统</title>
  <style>
    :root{--klein:#002FA7;--mist:#F7F8FA;--ink:#111827;--muted:#6B7280;--line:#E5E7EB}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:linear-gradient(135deg,rgba(0,47,167,.08),transparent 34%),#F7F8FA;color:var(--ink);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}.app{display:grid;grid-template-columns:260px 1fr;min-height:100vh}.side{border-right:1px solid var(--line);background:rgba(255,255,255,.88);padding:24px}.brand{font-size:12px;font-weight:800;letter-spacing:.35em;color:var(--klein);text-transform:uppercase}h1{margin:8px 0 0;font-size:25px;letter-spacing:-.03em}.side p{color:var(--muted);line-height:1.7}.main{max-width:1220px;width:100%;padding:28px 34px}.hero{border-radius:18px;background:var(--klein);color:white;padding:34px;box-shadow:0 18px 45px rgba(17,24,39,.08)}.hero h2{margin:12px 0 0;font-size:42px}.hero p{max-width:680px;color:rgba(255,255,255,.82);line-height:1.7}.grid{display:grid;gap:18px}.stats{grid-template-columns:repeat(4,1fr);margin-top:18px}.two{grid-template-columns:repeat(2,1fr);margin-top:20px}.card{border:1px solid rgba(255,255,255,.75);border-radius:16px;background:rgba(255,255,255,.9);padding:22px}.stat span{display:block;color:var(--muted);font-size:14px}.stat b{display:block;margin-top:8px;font-size:32px}.progress{height:8px;overflow:hidden;border-radius:99px;background:#EEF2F7}.bar{height:100%;border-radius:99px;background:var(--klein)}.hero .progress{margin-top:22px;background:rgba(255,255,255,.22)}.hero .bar{background:white}.task{margin-top:12px;border:1px solid #EEF0F4;border-radius:12px;background:#F9FAFB;padding:14px}.row{display:flex;justify-content:space-between;gap:12px}.chart{height:210px;display:flex;align-items:end;gap:10px}.chart i{flex:1;min-height:18px;border-radius:8px 8px 2px 2px;background:linear-gradient(180deg,var(--klein),#7CA7FF)}.donut{width:180px;height:180px;border-radius:50%;background:conic-gradient(var(--klein) 0 45%,#93C5FD 45% 68%,#111827 68% 82%,#CBD5E1 82% 100%);margin:auto;position:relative}.donut:after{content:"";position:absolute;inset:42px;background:white;border-radius:50%}@media(max-width:900px){.app{display:block}.main{padding:16px}.stats,.two{grid-template-columns:1fr}.hero h2{font-size:34px}}
  </style>
</head>
<body>
  <div class="app">
    <aside class="side"><div class="brand">Huangdi</div><h1>黄帝养成系统</h1><p>个人学习、工作与成长看板。数据保存在浏览器本地。</p></aside>
    <main class="main">
      <section class="hero"><small id="date"></small><h2>黄帝 Lv. 6</h2><p>今日修炼进度 40%。每日任务、英语、专注和复盘已经可以开始使用。</p><div class="progress"><div class="bar" style="width:40%"></div></div></section>
      <div class="grid stats"><div class="card stat"><span>今日总进度</span><b>40%</b></div><div class="card stat"><span>学习完成率</span><b>0%</b></div><div class="card stat"><span>工作完成率</span><b>0%</b></div><div class="card stat"><span>专注番茄钟</span><b>0 个</b></div></div>
      <div class="grid two"><div class="card"><h3>本周进度趋势</h3><div class="chart"><i style="height:60px"></i><i style="height:82px"></i><i style="height:94px"></i><i style="height:108px"></i><i style="height:126px"></i><i style="height:140px"></i><i style="height:80px"></i></div></div><div class="card"><h3>任务分类占比</h3><div class="donut"></div></div></div>
      <div class="grid two"><div class="card"><h3>今日重点任务</h3><div class="task"><div class="row"><b>六级单词 30 个</b><span>40%</span></div><div class="progress"><div class="bar" style="width:40%"></div></div></div><div class="task"><b>论文第五章修改</b></div><div class="task"><b>作品集页面优化</b></div></div><div class="card"><h3>六维属性</h3><div class="task"><div class="row"><b>英语力</b><span>Lv.4 · 62 EXP</span></div><div class="progress"><div class="bar" style="width:62%"></div></div></div><div class="task"><div class="row"><b>执行力</b><span>Lv.3 · 55 EXP</span></div><div class="progress"><div class="bar" style="width:55%"></div></div></div></div></div>
    </main>
  </div>
  <script>document.getElementById('date').textContent=new Date().toISOString().slice(0,10)</script>
</body>
</html>
