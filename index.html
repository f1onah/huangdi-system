<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>黄帝养成系统</title>
  <style>
    :root{--klein:#002FA7;--mist:#F7F8FA;--ink:#111827;--muted:#6B7280;--line:#E5E7EB}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:linear-gradient(135deg,rgba(0,47,167,.08),transparent 34%),#F7F8FA;color:var(--ink);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}.app{display:grid;grid-template-columns:260px 1fr;min-height:100vh}.side{border-right:1px solid var(--line);background:rgba(255,255,255,.88);padding:24px;backdrop-filter:blur(16px)}.brand{font-size:12px;font-weight:800;letter-spacing:.35em;color:var(--klein);text-transform:uppercase}h1{margin:8px 0 0;font-size:25px;letter-spacing:-.03em}.side p{color:var(--muted);line-height:1.7}.nav{display:grid;gap:6px;margin-top:28px}.nav button{border:0;border-radius:10px;background:transparent;padding:11px 12px;text-align:left;color:#4B5563}.nav button.active{background:var(--klein);color:white}.main{max-width:1220px;width:100%;padding:28px 34px}.hero{border-radius:18px;background:var(--klein);color:white;padding:34px;box-shadow:0 18px 45px rgba(17,24,39,.08)}.hero small{color:rgba(255,255,255,.72)}.hero h2{margin:12px 0 0;font-size:42px;letter-spacing:-.04em}.hero p{max-width:680px;color:rgba(255,255,255,.82);line-height:1.7}.grid{display:grid;gap:18px}.stats{grid-template-columns:repeat(4,1fr);margin-top:18px}.two{grid-template-columns:repeat(2,1fr);margin-top:20px}.card{border:1px solid rgba(255,255,255,.75);border-radius:16px;background:rgba(255,255,255,.9);padding:22px;box-shadow:0 1px 2px rgba(17,24,39,.05)}.stat span{display:block;color:var(--muted);font-size:14px}.stat b{display:block;margin-top:8px;font-size:32px}.progress{height:8px;overflow:hidden;border-radius:99px;background:#EEF2F7}.bar{height:100%;border-radius:99px;background:var(--klein)}.hero .progress{margin-top:22px;background:rgba(255,255,255,.22)}.hero .bar{background:white}.task{margin-top:12px;border:1px solid #EEF0F4;border-radius:12px;background:#F9FAFB;padding:14px}.row{display:flex;justify-content:space-between;gap:12px}.chart{height:210px;display:flex;align-items:end;gap:10px}.chart i{flex:1;min-height:18px;border-radius:8px 8px 2px 2px;background:linear-gradient(180deg,var(--klein),#7CA7FF)}.donut{width:180px;height:180px;border-radius:50%;background:conic-gradient(var(--klein) 0 45%,#93C5FD 45% 68%,#111827 68% 82%,#CBD5E1 82% 100%);margin:auto;position:relative}.donut:after{content:"";position:absolute;inset:42px;background:white;border-radius:50%}.panel{display:none}.panel.active{display:block}input,textarea,select{width:100%;border:1px solid var(--line);border-radius:10px;background:white;padding:10px 12px;margin-top:10px}textarea{min-height:90px}.btn{border:0;border-radius:10px;background:var(--klein);color:white;padding:10px 14px;font-weight:650;margin-top:10px}.muted{color:var(--muted)}@media(max-width:900px){.app{display:block}.side{position:static}.main{padding:16px}.stats,.two{grid-template-columns:1fr}.hero h2{font-size:34px}}
  </style>
</head>
<body>
  <div class="app">
    <aside class="side">
      <div class="brand">Huangdi</div>
      <h1>黄帝养成系统</h1>
      <p>个人学习、工作与成长看板。数据保存在浏览器本地。</p>
      <div class="nav">
        <button class="active" data-tab="dashboard">首页</button>
        <button data-tab="tasks">今日任务</button>
        <button data-tab="english">六级英语</button>
        <button data-tab="focus">专注修炼</button>
        <button data-tab="review">每日复盘</button>
      </div>
    </aside>
    <main class="main">
      <section id="dashboard" class="panel active">
        <div class="hero">
          <small id="date"></small>
          <h2>黄帝 Lv. 6</h2>
          <p>今日修炼进度 40%。先把每日任务、英语、专注和复盘跑通，后续再升级长期等级与统计。</p>
          <div class="progress"><div class="bar" style="width:40%"></div></div>
        </div>
        <div class="grid stats">
          <div class="card stat"><span>今日总进度</span><b>40%</b></div>
          <div class="card stat"><span>学习完成率</span><b>0%</b></div>
          <div class="card stat"><span>工作完成率</span><b>0%</b></div>
          <div class="card stat"><span>专注番茄钟</span><b id="focusCount">0 个</b></div>
        </div>
        <div class="grid two">
          <div class="card"><h3>本周进度趋势</h3><div class="chart"><i style="height:60px"></i><i style="height:82px"></i><i style="height:94px"></i><i style="height:108px"></i><i style="height:126px"></i><i style="height:140px"></i><i style="height:80px"></i></div></div>
          <div class="card"><h3>任务分类占比</h3><div class="donut"></div></div>
        </div>
        <div class="grid two">
          <div class="card"><h3>今日重点任务</h3><div id="taskList"></div></div>
          <div class="card"><h3>六维属性</h3><div class="task"><div class="row"><b>英语力</b><span>Lv.4 · 62 EXP</span></div><div class="progress"><div class="bar" style="width:62%"></div></div></div><div class="task"><div class="row"><b>执行力</b><span>Lv.3 · 55 EXP</span></div><div class="progress"><div class="bar" style="width:55%"></div></div></div></div>
        </div>
      </section>
      <section id="tasks" class="panel"><div class="card"><h2>今日任务看板</h2><input id="newTask" placeholder="添加一个今日任务"><button class="btn" onclick="addTask()">新增任务</button><div id="taskEditor"></div></div></section>
      <section id="english" class="panel"><div class="grid two"><div class="card"><h2>今日词库</h2><input id="word" placeholder="sustain"><input id="meaning" placeholder="维持；支撑"><button class="btn" onclick="addWord()">添加单词</button><div id="wordList"></div></div><div class="card"><h2>拼写试炼</h2><p class="task"><b id="quizMeaning">维持；支撑</b></p><input id="answer" placeholder="输入英文单词"><button class="btn" onclick="checkWord()">提交</button><p id="result" class="muted"></p></div></div></section>
      <section id="focus" class="panel"><div class="card" style="text-align:center"><h2>番茄钟 / 专注修炼</h2><p class="muted">闭关模式 · 25 分钟</p><div id="timer" style="font-size:72px;font-weight:800;color:var(--klein);margin:24px 0">25:00</div><button class="btn" onclick="completeFocus()">记录完成一个番茄钟</button></div></section>
      <section id="review" class="panel"><div class="card"><h2>每日复盘</h2><textarea id="done" placeholder="今日完成了什么"></textarea><textarea id="undone" placeholder="今日没有完成什么"></textarea><textarea id="reason" placeholder="原因是什么"></textarea><textarea id="value" placeholder="今天最有价值的一件事"></textarea><textarea id="mood" placeholder="今天的情绪状态"></textarea><textarea id="tomorrow" placeholder="明天最重要的三件事"></textarea><button class="btn" onclick="saveReview()">保存复盘</button><p id="saved" class="muted"></p></div></section>
    </main>
  </div>
  <script>
    const key='huangdi-pages-v2';
    const seed={tasks:['六级单词 30 个','论文第五章修改','作品集页面优化'],words:[['sustain','维持；支撑'],['fluctuate','波动；起伏'],['inevitable','不可避免的']],focus:0,review:{}};
    let data=JSON.parse(localStorage.getItem(key)||'null')||seed;
    const save=()=>localStorage.setItem(key,JSON.stringify(data));
    document.getElementById('date').textContent=new Date().toISOString().slice(0,10);
    document.querySelectorAll('.nav button').forEach(btn=>btn.onclick=()=>{document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));btn.classList.add('active');document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));document.getElementById(btn.dataset.tab).classList.add('active')});
    function render(){document.getElementById('focusCount').textContent=data.focus+' 个';document.getElementById('taskList').innerHTML=data.tasks.map((t,i)=>`<div class="task"><div class="row"><b>${t}</b><span>${i===0?'40':'0'}%</span></div><div class="progress"><div class="bar" style="width:${i===0?40:0}%"></div></div></div>`).join('');document.getElementById('taskEditor').innerHTML=data.tasks.map((t,i)=>`<div class="task row"><span>${t}</span><button class="btn" onclick="finishTask(${i})">完成</button></div>`).join('');document.getElementById('wordList').innerHTML=data.words.map(w=>`<div class="task"><b>${w[0]}</b><p class="muted">${w[1]}</p></div>`).join('');document.getElementById('quizMeaning').textContent=data.words[0]?.[1]||'请先添加单词'}
    function addTask(){const v=document.getElementById('newTask').value.trim();if(!v)return;data.tasks.unshift(v);save();render();document.getElementById('newTask').value=''}
    function finishTask(i){data.tasks[i]=data.tasks[i]+'（已完成）';save();render()}
    function addWord(){const w=document.getElementById('word').value.trim();if(!w)return;data.words.unshift([w,document.getElementById('meaning').value.trim()||'待补充释义']);save();render();word.value='';meaning.value=''}
    function checkWord(){const ok=document.getElementById('answer').value.trim().toLowerCase()===(data.words[0]?.[0]||'').toLowerCase();document.getElementById('result').textContent=ok?'正确，英语力 +1':`错误，正确答案是 ${data.words[0]?.[0]||''}`}
    function completeFocus(){data.focus++;save();render()}
    function saveReview(){data.review={done:done.value,undone:undone.value,reason:reason.value,value:value.value,mood:mood.value,tomorrow:tomorrow.value,savedAt:new Date().toISOString()};save();saved.textContent='已保存：'+new Date().toLocaleString('zh-CN')}
    render();
  </script>
</body>
</html>
