<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>黄帝养成系统</title>
  <meta name="description" content="个人学习、工作与成长看板 MVP" />
  <style>
    :root{--klein:#002FA7;--mist:#F7F8FA;--ink:#111827;--muted:#6B7280;--line:#E5E7EB;--card:rgba(255,255,255,.88)}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;background:linear-gradient(135deg,rgba(0,47,167,.08),transparent 34%),linear-gradient(225deg,rgba(17,24,39,.05),transparent 30%),var(--mist);color:var(--ink);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}button,input,textarea,select{font:inherit}button{cursor:pointer}.app{display:grid;min-height:100vh;grid-template-columns:264px 1fr}.side{position:sticky;top:0;height:100vh;border-right:1px solid var(--line);background:rgba(255,255,255,.86);padding:22px;backdrop-filter:blur(18px)}.brand-k{font-size:12px;font-weight:700;letter-spacing:.35em;color:var(--klein);text-transform:uppercase}.brand h1{margin:8px 0 0;font-size:25px;letter-spacing:-.03em}.brand p{margin:8px 0 0;color:var(--muted);font-size:14px;line-height:1.7}.nav{display:grid;gap:6px;margin-top:32px}.nav button{display:flex;align-items:center;gap:10px;border:0;border-radius:10px;background:transparent;color:#4B5563;padding:11px 12px;text-align:left}.nav button.active{background:var(--klein);color:white}.main{max-width:1240px;width:100%;padding:24px 32px}.mobile{display:none}.hero{border-radius:16px;background:var(--klein);color:white;padding:32px;box-shadow:0 18px 45px rgba(17,24,39,.08)}.hero small{color:rgba(255,255,255,.72)}.hero h2{font-size:42px;margin:12px 0 0;letter-spacing:-.04em}.hero p{max-width:680px;color:rgba(255,255,255,.82);line-height:1.7}.progress{height:8px;border-radius:99px;background:#EEF2F7;overflow:hidden}.hero .progress{background:rgba(255,255,255,.22)}.bar{height:100%;border-radius:99px;background:var(--klein);transition:.2s}.hero .bar{background:white}.grid{display:grid;gap:18px}.stats{grid-template-columns:repeat(4,minmax(0,1fr));margin-top:18px}.two{grid-template-columns:repeat(2,minmax(0,1fr));margin-top:20px}.four{grid-template-columns:repeat(4,minmax(0,1fr))}.card{border:1px solid rgba(255,255,255,.75);border-radius:16px;background:var(--card);box-shadow:0 1px 2px rgba(17,24,39,.05);backdrop-filter:blur(18px);padding:22px}.card h3{margin:0 0 16px;font-size:18px}.stat p{margin:0;color:var(--muted);font-size:14px}.stat b{display:block;margin-top:8px;font-size:32px}.task{border:1px solid #EEF0F4;border-radius:12px;background:#F9FAFB;padding:14px;margin-top:12px}.row{display:flex;justify-content:space-between;gap:12px;align-items:center}.title{display:flex;align-items:center;gap:10px;margin-bottom:20px}.title h2{margin:0;font-size:27px;letter-spacing:-.03em}.form{display:grid;gap:12px}.task-form{grid-template-columns:1fr 140px 110px 130px auto}.input,select,textarea{width:100%;border:1px solid var(--line);border-radius:10px;background:white;padding:10px 12px;outline:0}.input:focus,select:focus,textarea:focus{border-color:var(--klein);box-shadow:0 0 0 4px rgba(0,47,167,.1)}textarea{min-height:92px;resize:vertical}.btn{border:0;border-radius:10px;background:var(--klein);color:white;padding:10px 14px;font-weight:650}.btn.secondary{border:1px solid var(--line);background:white;color:#374151}.btn.danger{background:#FEF2F2;color:#B91C1C;border:1px solid #FECACA}.columns{grid-template-columns:repeat(4,minmax(0,1fr));align-items:start}.pill{font-size:12px;color:var(--muted);background:#F3F4F6;border-radius:99px;padding:4px 8px}.muted{color:var(--muted)}.tabs-top{display:none}.chart{height:210px;display:flex;align-items:end;gap:10px;padding-top:20px}.chart i{flex:1;background:linear-gradient(180deg,var(--klein),#7CA7FF);border-radius:8px 8px 2px 2px;min-height:18px}.donut{width:180px;height:180px;border-radius:50%;background:conic-gradient(var(--klein) 0 45%,#93C5FD 45% 68%,#111827 68% 82%,#CBD5E1 82% 100%);margin:auto;position:relative}.donut:after{content:"";position:absolute;inset:42px;background:white;border-radius:50%}.ach{display:grid;gap:12px;grid-template-columns:repeat(3,minmax(0,1fr))}.lock{background:#F9FAFB;border-radius:12px;padding:14px}.ok{color:var(--klein);font-weight:700}@media(max-width:980px){.app{display:block}.side{display:none}.main{padding:16px}.tabs-top{display:flex;gap:8px;overflow:auto;margin-bottom:16px;border:1px solid var(--line);border-radius:14px;background:white;padding:10px}.tabs-top button{white-space:nowrap;border:0;border-radius:10px;padding:9px 12px;background:#F3F4F6;color:#4B5563}.tabs-top button.active{background:var(--klein);color:white}.stats,.two,.four,.columns,.task-form,.ach{grid-template-columns:1fr}.hero h2{font-size:34px}}
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    const KEY='huangdi-static-v1';
    const today=()=>new Date().toISOString().slice(0,10);
    const uid=p=>p+'-'+Date.now()+'-'+Math.random().toString(16).slice(2);
    const cats=['学习','工作','毕业论文','作品集','英语','生活'];
    const statuses=['未开始','进行中','已完成','暂停'];
    const defaults={tasks:[{id:'t1',title:'六级单词 30 个',category:'英语',priority:'高',status:'进行中',estimatedMinutes:45,actualMinutes:20,progress:40,note:'完成今日词库与拼写试炼',date:today(),createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()},{id:'t2',title:'论文第五章修改',category:'毕业论文',priority:'高',status:'未开始',estimatedMinutes:90,actualMinutes:0,progress:0,note:'',date:today(),createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()},{id:'t3',title:'作品集页面优化',category:'作品集',priority:'中',status:'未开始',estimatedMinutes:60,actualMinutes:0,progress:0,note:'',date:today(),createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()}],records:[],review:{done:'',undone:'',reason:'',value:'',mood:'',tomorrow:'',savedAt:''},words:[{id:'w1',word:'sustain',meaning:'维持；支撑',familiarity:2,wrongCount:0,correctCount:0},{id:'w2',word:'fluctuate',meaning:'波动；起伏',familiarity:1,wrongCount:1,correctCount:0},{id:'w3',word:'inevitable',meaning:'不可避免的',familiarity:3,wrongCount:0,correctCount:1}],focusCount:0};
    let state=JSON.parse(localStorage.getItem(KEY)||'null')||defaults;let tab='dashboard';let timer=null;let seconds=25*60;
    const save=()=>localStorage.setItem(KEY,JSON.stringify(state));const setState=s=>{state=s;save();render()};
    function pct(v){return `<div class="progress"><div class="bar" style="width:${Math.max(0,Math.min(100,v))}%"></div></div>`}
    function shell(content){const nav=[['dashboard','首页'],['tasks','今日任务'],['records','详细记录'],['english','六级英语'],['focus','专注修炼'],['review','每日复盘'],['stats','周月统计']];return `<div class="app"><aside class="side"><div class="brand"><div class="brand-k">Huangdi</div><h1>黄帝养成系统</h1><p>个人学习、工作与成长看板。</p></div><div class="nav">${nav.map(n=>`<button class="${tab===n[0]?'active':''}" onclick="tab='${n[0]}';render()">${n[1]}</button>`).join('')}</div><button class="btn secondary" style="width:100%;margin-top:28px" onclick="state=defaults;save();render()">重置演示数据</button></aside><main class="main"><div class="tabs-top">${nav.map(n=>`<button class="${tab===n[0]?'active':''}" onclick="tab='${n[0]}';render()">${n[1]}</button>`).join('')}</div>${content}</main></div>`}
    function title(t){return `<div class="title"><h2>${t}</h2></div>`}
    function dashboard(){const tasks=state.tasks.filter(t=>t.date===today());const completed=tasks.filter(t=>t.status==='已完成').length;const overall=tasks.length?Math.round(tasks.reduce((s,t)=>s+t.progress,0)/tasks.length):0;const study=tasks.filter(t=>['学习','英语','毕业论文'].includes(t.category));const work=tasks.filter(t=>['工作','作品集'].includes(t.category));const rate=a=>a.length?Math.round(a.filter(t=>t.status==='已完成').length/a.length*100):0;const attrs=[['学术力',35+tasks.filter(t=>t.category==='毕业论文').reduce((s,t)=>s+t.progress,0)/3],['英语力',30+state.words.reduce((s,w)=>s+w.familiarity*5+w.correctCount*2,0)],['创作力',28+tasks.filter(t=>t.category==='作品集').reduce((s,t)=>s+t.progress,0)/2],['执行力',36+completed*12+state.focusCount*8],['表达力',32+tasks.filter(t=>t.note).length*8],['生活力',26+state.focusCount*5]];return shell(`<section class="hero"><small>${today()}</small><h2>黄帝 Lv. ${Math.max(1,Math.floor((overall+state.focusCount*8)/40)+1)}</h2><p>今日总进度 ${overall}%，完成 ${completed}/${tasks.length} 个任务。保持节奏，比爆发更可靠。</p>${pct(overall)}</section><div class="grid stats"><div class="card stat"><p>今日总进度</p><b>${overall}%</b></div><div class="card stat"><p>学习完成率</p><b>${rate(study)}%</b></div><div class="card stat"><p>工作完成率</p><b>${rate(work)}%</b></div><div class="card stat"><p>专注番茄钟</p><b>${state.focusCount} 个</b></div></div><div class="grid two"><div class="card"><h3>本周进度趋势</h3><div class="chart">${[42,50,58,63,70,76,overall].map(v=>`<i style="height:${Math.max(18,v*2)}px"></i>`).join('')}</div></div><div class="card"><h3>任务分类占比</h3><div class="donut"></div></div></div><div class="grid two"><div class="card"><h3>今日重点任务</h3>${tasks.slice(0,4).map(t=>`<div class="task"><div class="row"><b>${t.title}</b><span class="muted">${t.progress}%</span></div>${pct(t.progress)}</div>`).join('')}</div><div class="card"><h3>六维属性</h3>${attrs.map(a=>{const v=Math.min(100,Math.round(a[1]));return `<div style="margin:14px 0"><div class="row"><span>${a[0]}</span><span class="muted">Lv.${Math.floor(v/20)+1} · ${v} EXP</span></div>${pct(v)}</div>`}).join('')}</div></div>`)}
    function tasks(){const todayTasks=state.tasks.filter(t=>t.date===today());return shell(`${title('今日任务看板')}<div class="card"><div class="form task-form"><input class="input" id="newTitle" placeholder="任务名称"><select id="newCat">${cats.map(c=>`<option>${c}</option>`).join('')}</select><select id="newPri"><option>高</option><option selected>中</option><option>低</option></select><input class="input" id="newMin" type="number" value="45"><button class="btn" onclick="addTask()">新增</button></div></div><div class="grid columns" style="margin-top:18px">${statuses.map(s=>`<div class="card"><h3>${s}</h3>${todayTasks.filter(t=>t.status===s).map(t=>taskCard(t)).join('')}</div>`).join('')}</div>`)}
    function taskCard(t){return `<div class="task"><input class="input" value="${t.title}" onchange="updateTask('${t.id}',{title:this.value})"><div class="grid two" style="margin-top:10px"><select onchange="updateTask('${t.id}',{category:this.value})">${cats.map(c=>`<option ${t.category===c?'selected':''}>${c}</option>`).join('')}</select><select onchange="updateTask('${t.id}',{priority:this.value})"><option ${t.priority==='高'?'selected':''}>高</option><option ${t.priority==='中'?'selected':''}>中</option><option ${t.priority==='低'?'selected':''}>低</option></select></div><textarea style="margin-top:10px" placeholder="备注" onchange="updateTask('${t.id}',{note:this.value})">${t.note||''}</textarea><div class="row" style="margin-top:10px"><input type="range" min="0" max="100" step="5" value="${t.progress}" style="width:100%;accent-color:var(--klein)" oninput="updateTask('${t.id}',{progress:Number(this.value),status:Number(this.value)>=100?'已完成':'${t.status}'})"><span>${t.progress}%</span></div><div class="grid two" style="margin-top:10px">${statuses.map(s=>`<button class="btn ${s===t.status?'':'secondary'}" onclick="updateTask('${t.id}',{status:'${s}',progress:'${s}'==='已完成'?100:${t.progress}})">${s}</button>`).join('')}</div><button class="btn danger" style="width:100%;margin-top:10px" onclick="deleteTask('${t.id}')">删除</button></div>`}
    window.addTask=()=>{const title=document.getElementById('newTitle').value.trim();if(!title)return;const now=new Date().toISOString();state.tasks.unshift({id:uid('task'),title,category:document.getElementById('newCat').value,priority:document.getElementById('newPri').value,status:'未开始',estimatedMinutes:Number(document.getElementById('newMin').value||45),actualMinutes:0,progress:0,note:'',date:today(),createdAt:now,updatedAt:now});setState(state)};window.updateTask=(id,patch)=>setState({...state,tasks:state.tasks.map(t=>t.id===id?{...t,...patch,updatedAt:new Date().toISOString()}:t)});window.deleteTask=id=>setState({...state,tasks:state.tasks.filter(t=>t.id!==id)});
    function records(){return shell(`${title('详细记录')}<div class="card form"><select id="recTask">${state.tasks.map(t=>`<option value="${t.id}">${t.title}</option>`).join('')}</select><textarea id="recDid" placeholder="今天做了什么"></textarea><textarea id="recProblem" placeholder="遇到的问题"></textarea><textarea id="recSolution" placeholder="解决方式"></textarea><textarea id="recNext" placeholder="明天继续做什么"></textarea><input class="input" id="recLink" placeholder="相关链接或备注"><button class="btn" onclick="saveRecord()">保存记录</button></div><div class="grid" style="margin-top:18px">${state.records.map(r=>`<div class="card"><p class="muted">${r.date} · ${(state.tasks.find(t=>t.id===r.taskId)||{}).title||'任务'}</p><p>${r.did}</p><p class="muted">${r.problem?`问题：${r.problem}`:''}</p><p class="muted">${r.solution?`解决：${r.solution}`:''}</p></div>`).join('')}</div>`)}
    window.saveRecord=()=>{state.records.unshift({id:uid('record'),taskId:recTask.value,date:today(),did:recDid.value,problem:recProblem.value,solution:recSolution.value,next:recNext.value,link:recLink.value,createdAt:new Date().toISOString()});setState(state)};
    function english(){const wrong=state.words.filter(w=>w.wrongCount>0);return shell(`${title('六级英语模块')}<div class="grid two"><div class="card"><h3>今日词库</h3><div class="form" style="grid-template-columns:150px 1fr auto"><input class="input" id="word" placeholder="sustain"><input class="input" id="meaning" placeholder="维持；支撑"><button class="btn" onclick="addWord()">添加</button></div>${state.words.map(w=>`<div class="task"><b>${w.word}</b><p class="muted">${w.meaning}</p>${pct(w.familiarity*20)}</div>`).join('')}</div><div class="card"><h3>拼写试炼</h3><div class="task"><b id="quizMeaning">${state.words[0]?.meaning||'请先添加单词'}</b></div><input class="input" id="answer" style="margin-top:12px" placeholder="输入英文单词"><button class="btn" style="margin-top:12px" onclick="checkWord()">提交</button><p id="wordResult" class="muted"></p><h3>错词记录</h3>${wrong.map(w=>`<p style="color:#DC2626">${w.word} · 错 ${w.wrongCount} 次</p>`).join('')||'<p class="muted">暂无错词</p>'}</div></div>`)}
    window.addWord=()=>{if(!word.value.trim())return;state.words.unshift({id:uid('word'),word:word.value.trim(),meaning:meaning.value.trim()||'待补充释义',familiarity:0,wrongCount:0,correctCount:0});setState(state)};window.checkWord=()=>{const w=state.words[0];if(!w)return;const ok=answer.value.trim().toLowerCase()===w.word.toLowerCase();state.words=state.words.map(x=>x.id===w.id?{...x,familiarity:Math.max(0,Math.min(5,x.familiarity+(ok?1:-1))),correctCount:x.correctCount+(ok?1:0),wrongCount:x.wrongCount+(ok?0:1)}:x);save();document.getElementById('wordResult').textContent=ok?'正确，英语力 +1':`错误，正确答案是 ${w.word}`};
    function focus(){return shell(`${title('番茄钟 / 专注修炼')}<div class="card" style="max-width:680px;margin:auto;text-align:center"><p class="muted">闭关模式 · 25 分钟</p><div id="timer" style="font-size:72px;font-weight:800;color:var(--klein);margin:28px 0">${fmt()}</div><button class="btn" onclick="toggleTimer()">开始 / 暂停</button><button class="btn secondary" onclick="resetTimer()" style="margin-left:8px">重置</button><p class="muted">今日已完成 ${state.focusCount} 个番茄钟，共 ${state.focusCount*25} 分钟。</p></div>`)}
    function fmt(){return String(Math.floor(seconds/60)).padStart(2,'0')+':'+String(seconds%60).padStart(2,'0')}window.toggleTimer=()=>{if(timer){clearInterval(timer);timer=null;return}timer=setInterval(()=>{seconds--;if(seconds<=0){clearInterval(timer);timer=null;seconds=25*60;state.focusCount++;save()}const el=document.getElementById('timer');if(el)el.textContent=fmt()},1000)};window.resetTimer=()=>{if(timer)clearInterval(timer);timer=null;seconds=25*60;render()};
    function review(){const r=state.review;return shell(`${title('每日复盘')}<div class="card form">${['done:今日完成了什么','undone:今日没有完成什么','reason:原因是什么','value:今天最有价值的一件事','mood:今天的情绪状态','tomorrow:明天最重要的三件事'].map(x=>{const [k,p]=x.split(':');return `<textarea id="rv_${k}" placeholder="${p}">${r[k]||''}</textarea>`}).join('')}<button class="btn" onclick="saveReview()">保存复盘</button></div>`)}
    window.saveReview=()=>{['done','undone','reason','value','mood','tomorrow'].forEach(k=>state.review[k]=document.getElementById('rv_'+k).value);state.review.savedAt=new Date().toISOString();setState(state)};
    function stats(){const completed=state.tasks.filter(t=>t.status==='已完成').length;const avg=state.tasks.length?Math.round(state.tasks.reduce((s,t)=>s+t.progress,0)/state.tasks.length):0;return shell(`${title('周 / 月统计')}<div class="grid stats"><div class="card stat"><p>本周完成数</p><b>${completed}</b></div><div class="card stat"><p>平均完成率</p><b>${avg}%</b></div><div class="card stat"><p>学习总时长</p><b>${state.tasks.filter(t=>['学习','英语','毕业论文'].includes(t.category)).reduce((s,t)=>s+t.actualMinutes,0)} 分</b></div><div class="card stat"><p>连续记录天数</p><b>${new Set(state.records.map(r=>r.date)).size} 天</b></div></div><div class="grid two"><div class="card"><h3>最近 7 天趋势</h3><div class="chart">${[30,42,48,52,64,70,avg].map(v=>`<i style="height:${Math.max(18,v*2)}px"></i>`).join('')}</div></div><div class="card"><h3>分类占比</h3><div class="donut"></div></div></div><div class="card" style="margin-top:18px"><h3>成就系统雏形</h3><div class="ach"><div class="lock"><span class="${completed?'ok':'muted'}">${completed?'已解锁':'待解锁'}</span> · 完成第一个任务</div><div class="lock"><span class="${state.review.savedAt?'ok':'muted'}">${state.review.savedAt?'已解锁':'待解锁'}</span> · 完成一次复盘</div><div class="lock"><span class="${state.focusCount?'ok':'muted'}">${state.focusCount?'已解锁':'待解锁'}</span> · 完成一个番茄钟</div></div></div>`)}
    function render(){document.getElementById('app').innerHTML={dashboard,tasks,records,english,focus,review,stats}[tab]()}render();
  </script>
</body>
</html>
